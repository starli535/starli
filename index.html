<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的创意小站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.15);
        }

        .subtitle {
            text-align: center;
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 40px;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
        }

        .nav-card {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-card:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }

        .nav-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .nav-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            opacity: 0.8;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ 我的创意小站 ✨</h1>
        <p class="subtitle">这里收藏了我的作品，点击卡片即可查看</p>

        <div class="nav-grid">
            <a href="Art.html" class="nav-card">
                <div class="nav-icon">🎨</div>
                <div class="nav-title">Art</div>
            </a>
            <a href="Firework.html" class="nav-card">
                <div class="nav-icon">🎆</div>
                <div class="nav-title">Firework</div>
            </a>
            <a href="Food.html" class="nav-card">
                <div class="nav-icon">🍕</div>
                <div class="nav-title">Food</div>
            </a>
            <!-- 新增教学工具卡片，对应文件请命名为 tools.html -->
            <a href="tools.html" class="nav-card">
                <div class="nav-icon">📚</div>
                <div class="nav-title">教学工具</div>
            </a>
        </div>
    </div>

    <div class="footer">
        Made with ❤️ by starli535
    </div>
</body>
</html>
